name: brew test-bot
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  test-bot:
    if: ${{ github.triggering_actor != 'github-actions[bot]' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-26-arm
            labels: [self-hosted, platform-builder-MacOSX-26.3.1-arm64]
    runs-on: ${{ matrix.labels }}
    env:
      HOMEBREW_NO_INSTALL_FROM_API: 1
    steps:
      - name: Cleanup working directory
        if: ${{ contains(matrix.labels, 'self-hosted') }}
        run: rm -rf "${GITHUB_WORKSPACE:?}"/*

      - name: Checkout current branch
        if: ${{ contains(matrix.labels, 'self-hosted') }}
        env:
          PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          cd "$(brew --repository "${REPO_OWNER}/ecmwf")"
          git restore .
          git fetch origin
          git fetch origin "$GITHUB_SHA"
          git checkout "$PR_SHA"

      - name: Set up Homebrew
        if: ${{ !contains(matrix.labels, 'self-hosted') }}
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        if: ${{ !contains(matrix.labels, 'self-hosted') }}
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ !contains(matrix.labels, 'self-hosted') && steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - name: Run homebrew cleanup
        if: ${{ !contains(matrix.labels, 'self-hosted') }}
        run: brew test-bot --only-cleanup-before

      - name: Restore brew environment to baseline
        if: ${{ contains(matrix.labels, 'self-hosted') }}
        run: |
          brew bundle check --file="$HOME/.Brewfile"

      - name: Run the local system setup check
        run: brew test-bot --only-setup

      - name: Run syntax check
        run: brew test-bot --only-tap-syntax

      - name: Build bottles
        if: github.event_name == 'pull_request'
        run: brew test-bot --only-formulae --fail-fast --skip-recursive-dependents --root-url=https://get-test.ecmwf.int/repository/homebrew

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.name }}
          path: "*.bottle.*"

      - name: Cleanup brew environment after build
        if: ${{ always() && contains(matrix.labels, 'self-hosted') }}
        continue-on-error: true
        run: |
          brew_bundle_cleanup
