name: brew test-bot bottles

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  checks: read
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  syntax:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

  test-bot:
    needs: syntax
    if: ${{ github.event_name == 'pull_request' && github.triggering_actor != 'github-actions[bot]' }}
    env:
      HOMEBREW_CURLRC: 1
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Configure GitHub auth for private repo downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" >> ~/.netrc
          echo "machine codeload.github.com login x-access-token password ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc
          echo "--netrc-optional" >> ~/.curlrc

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - name: Debug auth and download
        run: |
          echo "=== .netrc still intact? ==="
          ls -la ~/.netrc
          awk '{if(NF>=6) print $1,$2,$3,$4,"****"; else print}' ~/.netrc
          echo "=== .curlrc still intact? ==="
          cat ~/.curlrc 2>/dev/null || echo ".curlrc MISSING"
          echo "=== HOMEBREW_CURLRC ==="
          echo "HOMEBREW_CURLRC=${HOMEBREW_CURLRC:-unset}"
          echo "=== Homebrew env (curl-related) ==="
          brew config | grep -i curl || true
          env | grep -i homebrew | sort || true
          echo "=== Which curl does Homebrew use? ==="
          which curl
          brew --prefix curl 2>/dev/null || echo "No brewed curl"
          echo "=== Test GET (not HEAD) to archive URL ==="
          curl -sS -L --netrc-optional -o /dev/null -w "archive GET: HTTP %{http_code}, size=%{size_download}, url_effective=%{url_effective}\n" "https://github.com/recmanj/ecmwf-toolbox/archive/refs/tags/2026.01.0.0.tar.gz" || true
          echo "=== Test GET to API tarball ==="
          curl -sS -L --netrc-optional -o /dev/null -w "api GET: HTTP %{http_code}, size=%{size_download}, url_effective=%{url_effective}\n" "https://api.github.com/repos/recmanj/ecmwf-toolbox/tarball/2026.01.0.0" || true
          echo "=== Test with explicit Authorization header ==="
          curl -sS -L -o /dev/null -w "explicit auth: HTTP %{http_code}, size=%{size_download}\n" -H "Authorization: token ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" "https://api.github.com/repos/recmanj/ecmwf-toolbox/tarball/2026.01.0.0" || true
          echo "=== Check repo visibility ==="
          curl -sS -w "\nHTTP %{http_code}\n" -H "Authorization: token ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" "https://api.github.com/repos/recmanj/ecmwf-toolbox" | head -5 || true
          echo "=== Brew cache location ==="
          brew --cache 2>/dev/null || true

      - name: Pre-fetch source into Homebrew cache
        run: |
          CACHE_DIR=$(brew --cache)
          FORMULA_CACHE=$(brew --cache --formula recmanj-org/homebrew-ecmwf/ecmwf-toolbox 2>/dev/null) || true
          echo "Cache dir: $CACHE_DIR"
          echo "Formula cache: $FORMULA_CACHE"
          if [ -n "$FORMULA_CACHE" ]; then
            mkdir -p "$(dirname "$FORMULA_CACHE")"
            echo "Downloading to $FORMULA_CACHE ..."
            curl -sS -L -H "Authorization: token ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" \
              -o "$FORMULA_CACHE" \
              "https://api.github.com/repos/recmanj/ecmwf-toolbox/tarball/2026.01.0.0"
            ls -la "$FORMULA_CACHE"
            echo "SHA256: $(shasum -a 256 "$FORMULA_CACHE" | awk '{print $1}')"
          else
            echo "Could not determine formula cache path, trying manual download to cache dir"
            curl -sS -L -H "Authorization: token ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" \
              -o /tmp/ecmwf-toolbox.tar.gz \
              "https://api.github.com/repos/recmanj/ecmwf-toolbox/tarball/2026.01.0.0"
            ls -la /tmp/ecmwf-toolbox.tar.gz
            echo "SHA256: $(shasum -a 256 /tmp/ecmwf-toolbox.tar.gz | awk '{print $1}')"
          fi

      - name: Build bottles
        run: brew test-bot --only-formulae --fail-fast --verbose

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.runner }}
          path: "*.bottle.*"
