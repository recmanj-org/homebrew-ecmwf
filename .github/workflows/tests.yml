name: brew test-bot
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run syntax check
        run: brew test-bot --only-tap-syntax
  test-bot:
    if: ${{ github.triggering_actor != 'github-actions[bot]' }}
    strategy:
      fail-fast: false
      matrix:
        name:
          - ubuntu-latest
          - macos-26-arm
          - macos-26-gh
        include:
          - name: ubuntu-latest
            labels: [ubuntu-latest]
          - name: macos-26-arm
            labels: [self-hosted, platform-builder-MacOSX-26.3.1-arm64]
          - name: macos-26-gh
            labels: [macos-26]
    runs-on: ${{ matrix.labels }}
    env:
      GITHUB_ACTIONS_HOMEBREW_SELF_HOSTED: ${{ contains(matrix.labels, 'self-hosted') && '1' || '' }}
    steps:
      - name: Checkout current branch
        if: ${{ contains(matrix.labels, 'self-hosted') }}
        env:
          PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          cd "$(brew --repository "${REPO_OWNER}/ecmwf")"
          git restore .
          git fetch origin
          git fetch origin "$GITHUB_SHA"
          git checkout "$PR_SHA"

      - name: Set up Homebrew
        if: ${{ !contains(matrix.labels, 'self-hosted') }}
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        if: ${{ !contains(matrix.labels, 'self-hosted') }}
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ !contains(matrix.labels, 'self-hosted') && steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - name: Run homebrew cleanup
        run: brew test-bot --only-cleanup-before

      - name: Check brew environment baseline
        if: ${{ contains(matrix.labels, 'self-hosted') }}
        run: |
          brew bundle check --file="$HOME/.Brewfile"
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Run the local system setup check
        run: brew test-bot --only-setup

      - name: Build bottles
        if: github.event_name == 'pull_request'
        run: brew test-bot --only-formulae --fail-fast --skip-recursive-dependents --root-url=https://get-test.ecmwf.int/repository/homebrew

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.name }}
          path: "*.bottle.*"

      - name: Cleanup brew environment after build
        if: ${{ always() && contains(matrix.labels, 'self-hosted') }}
        continue-on-error: true
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew test-bot --only-cleanup-after
          brew bundle cleanup --force --file="$HOME/.Brewfile"
          brew bundle list --formula --file="$HOME/.Brewfile" | while read -r pkg; do
            brew link --overwrite "$pkg" 2>/dev/null || true
          done
