name: brew test-bot bottles

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  checks: read
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  syntax:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

  test-bot:
    needs: syntax
    if: ${{ github.event_name == 'pull_request' && github.triggering_actor != 'github-actions[bot]' }}
    env:
      HOMEBREW_CURLRC: 1
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Configure GitHub auth for private repo downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" >> ~/.netrc
          echo "machine codeload.github.com login x-access-token password ${{ secrets.ECMWF_TOOLBOX_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc
          echo "--netrc-optional" >> ~/.curlrc

      - name: Debug auth setup
        run: |
          echo "=== Token presence ==="
          if [ -n "${{ secrets.ECMWF_TOOLBOX_TOKEN }}" ]; then echo "Token is SET"; else echo "Token is EMPTY"; fi
          echo "=== .netrc exists ==="
          ls -la ~/.netrc
          echo "=== .netrc content (masked) ==="
          awk '{if(NF>=6) print $1,$2,$3,$4,"****"; else print}' ~/.netrc
          echo "=== .curlrc content ==="
          cat ~/.curlrc
          echo "=== HOMEBREW_CURLRC ==="
          echo "HOMEBREW_CURLRC=$HOMEBREW_CURLRC"
          echo "=== Test curl to github.com (HEAD, follow redirects) ==="
          curl -sI -L --netrc-optional -o /dev/null -w "github.com: HTTP %{http_code}, redirect_url=%{redirect_url}\n" "https://github.com/recmanj/ecmwf-toolbox/archive/refs/tags/2026.01.0.0.tar.gz" || true
          echo "=== Test curl to API endpoint ==="
          curl -sI --netrc-optional -o /dev/null -w "api: HTTP %{http_code}\n" "https://api.github.com/repos/recmanj/ecmwf-toolbox/tarball/2026.01.0.0" || true
          echo "=== Which curl ==="
          which curl && curl --version | head -1
          echo "=== Homebrew curl ==="
          brew --prefix curl 2>/dev/null || echo "No brewed curl"

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - name: Build bottles
        run: brew test-bot --only-formulae --fail-fast --verbose

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.runner }}
          path: "*.bottle.*"
